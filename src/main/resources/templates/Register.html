<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>TEA : REGISTER</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
	<link rel="stylesheet" href="" th:href="@{/css/Navigation.css}" />
	<link rel="stylesheet" href="" th:href="@{/css/Login.css}" />
</head>

<body>
	<nav th:replace="~{Navigation::navbar()}">
	</nav>
	<div class="LoginContainer">
		<div class="admin">
			<div class="content">
				<strong style="font-size: 16px;margin-bottom: 0px;">BUSINESS</strong>
				<h2>Create an <span style="color:green;">Account</span></h2>
				<p style="font-size: 16px;">Join us today to get the best tea products!</p>
			</div>
		</div>
		<div class="user">
			<div class="content" style="top: 150px;">
				<h2> <span style="color:green;">Register</span> Here</h2>
				<form action="" th:action="@{/registerUser}" method="post" class="form">
					<b>Name :</b>
					<input type="text" name="uname" placeholder="Enter full name" required> <br />

					<b>Email :</b>
					<input type="email" name="uemail" placeholder="Enter email" required> <br />
					
					<b>Phone Number :</b>
					<input type="tel" name="unumber" pattern="[0-9]{10}" placeholder="Enter 10 digit number" required> <br />

					<b> Password:</b>
					<input type="password" name="upassword" placeholder="Enter password" required maxlength="8"
						minlength="4" class="userPassword"> <br />

					<button type="submit" class="loginButton" style="width: 100px;">Register</button><br>

					<p>Already have an account? <a href="" th:href="@{/login}" style="color: green;">Login Here</a></p>
				</form>
			</div>
		</div>
	</div>
</body>

</html>
